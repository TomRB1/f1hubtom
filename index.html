<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F1 Login Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#f20d0d",
          "background-light": "#f8f5f5",
          "background-dark": "#221010"
        },
        fontFamily: {
          "display": ["Space Grotesk","sans-serif"]
        },
        borderRadius: {
          "DEFAULT": "0.25rem",
          "lg": "0.5rem",
          "xl": "0.75rem",
          "full": "9999px"
        }
      }
    }
  }
</script>
<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
}
body { min-height: max(884px, 100dvh); }
</style>
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>
<body class="font-display">
<div class="flex min-h-screen w-full flex-col items-center justify-center bg-background-dark">
  <div class="flex flex-col items-center justify-center pb-8">
    <svg class="h-10 text-white" fill="currentColor" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 0 H40 V10 H10 V20 H40 V30 H10 V40 H40 V50 H0 Z"></path>
      <path d="M50 0 L60 0 L60 50 L50 50 Z"></path>
      <path d="M80 0 L120 0 L100 25 L120 50 L80 50 L100 25 Z" fill="#f20d0d"></path>
      <path d="M140 20 C140 0, 180 0, 180 20 S140 40, 180 40 L180 50 C130 50, 130 10, 140 20 Z"></path>
    </svg>
    <p class="text-white/80 font-display text-sm tracking-widest pt-2">RACING PORTAL</p>
  </div>

  <div class="flex w-full max-w-md flex-col rounded-xl bg-black/30 p-6 backdrop-blur-md border border-white/10">
    <h1 class="text-white tracking-light text-[32px] font-bold leading-tight text-center pb-6 font-display">Welcome Back Driver</h1>
    
    <label class="flex flex-col w-full">
      <p class="text-white/90 text-base font-medium leading-normal pb-2 font-display">Email Address</p>
      <div class="relative flex items-center">
        <span class="material-symbols-outlined absolute left-4 text-white/50">mail</span>
        <input id="email" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/80 border border-white/10 bg-[#2C2C2C]/50 h-14 placeholder:text-white/40 pl-12 p-4 text-base font-normal font-display" placeholder="Enter your email"/>
      </div>
    </label>

    <div class="w-full pt-6">
      <button id="sendCodeBtn" class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] font-display transition-transform duration-200 hover:scale-[1.02] active:scale-[0.98]">
        <span class="truncate">START YOUR ENGINE</span>
      </button>
    </div>
  </div>
</div>

<script>
  emailjs.init("eIsE6w5jjP1BDxikf");

  const emailInput = document.getElementById("email");
  const sendBtn = document.getElementById("sendCodeBtn");

  sendBtn.addEventListener("click", function() {
    const email = emailInput.value.trim();
    if (!email) return alert("Ingrese un email valido");

    let code = Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem("f1_code", code);
    localStorage.setItem("f1_email", email);

    emailjs.send("service_obaxqky", "template_108m6ni", { email: email, code: code })
      .then(function(response) {
        console.log("Email enviado:", response.status, response.text);
        alert("Codigo enviado a " + email);
        window.location.href = "verify.html";
      }, function(error) {
        console.error("Error enviando email:", error);
        alert("No se pudo enviar el codigo, revise la consola");
      });
  });
</script>
</body>
</html>
