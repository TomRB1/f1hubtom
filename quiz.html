<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>F1 Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Space Grotesk',sans-serif}</style>
</head>
<body class="bg-[#0f1115] text-white min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-2xl bg-black/60 backdrop-blur-md border border-white/5 rounded-xl p-6">
    <header class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">F1 Quiz Challenge</h1>
      <a href="menu.html" class="text-sm text-white/70 hover:text-red-400">← Volver al menú</a>
    </header>

    <div id="intro" class="space-y-4">
      <p class="text-white/80">Probá tus conocimientos de F1. 8 preguntas. Sumá puntos por respuestas correctas.</p>
      <button id="startBtn" class="bg-red-600 px-5 py-2 rounded-md font-semibold hover:bg-red-500">Comenzar Quiz</button>
    </div>

    <div id="quiz" class="hidden flex-col space-y-4">
      <div class="flex items-center justify-between">
        <div class="text-sm text-white/80">Pregunta <span id="qIndex">1</span> / <span id="qTotal">8</span></div>
        <div class="text-sm">Score: <span id="score">0</span></div>
      </div>

      <div id="card" class="bg-white/5 rounded-lg p-6">
        <h2 id="questionText" class="text-lg font-semibold mb-4"></h2>
        <div id="answers" class="grid gap-3"></div>
      </div>

      <div class="flex justify-between">
        <button id="nextBtn" class="bg-white/10 px-4 py-2 rounded-md disabled:opacity-50" disabled>Siguiente</button>
        <button id="quitBtn" class="bg-white/10 px-4 py-2 rounded-md">Rendirse</button>
      </div>
    </div>

    <div id="result" class="hidden text-center space-y-4">
      <h2 class="text-2xl font-bold">Resultado</h2>
      <p class="text-white/80">Obtuviste <span id="finalScore">0</span> / <span id="maxScore">0</span></p>
      <div class="flex justify-center gap-3">
        <button id="retryBtn" class="bg-red-600 px-4 py-2 rounded-md">Jugar de nuevo</button>
        <a href="menu.html" class="bg-white/10 px-4 py-2 rounded-md">Volver al menú</a>
      </div>
    </div>
  </div>

<script>
  // Preguntas
const questions = [
  { q: "¿Quién va primero en el campeonato de pilotos en 2025?", choices: ["Oscar Piastri","Lando Norris","Max Verstappen","Lewis Hamilton"], a: 0 },
  { q: "¿Qué equipo tiene a Lewis Hamilton en 2025?", choices: ["Mercedes","Ferrari","Red Bull","McLaren"], a: 1 },
  { q: "¿Cuál de estos equipos cambió su nombre para 2025?", choices: ["Racing Bulls","AlphaTauri","Haas","Williams"], a: 0 },
  { q: "¿Qué piloto corre para McLaren en 2025?", choices: ["Oscar Piastri","Charles Leclerc","Fernando Alonso","George Russell"], a: 0 },
  { q: "¿Qué equipo sigue usando el color rojo icónico en 2025?", choices: ["Ferrari","Mercedes","Red Bull","Alpine"], a: 0 },
  { q: "¿Qué piloto se trasladó a Ferrari para la temporada 2025?", choices: ["Lewis Hamilton","Max Verstappen","Lando Norris","Oscar Piastri"], a: 0 },
  { q: "¿Cuál equipo está ligado al nombre de Honda RBPT en 2025?", choices: ["Red Bull Racing","Racing Bulls","Mercedes","Aston Martin"], a: 0 },
  { q: "¿Qué piloto es compañero de equipo de Max Verstappen en 2025?", choices: ["Liam Lawson","Yuki Tsunoda","Charles Leclerc","George Russell"], a: 0 }
];


  // DOM
  const intro = document.getElementById('intro');
  const startBtn = document.getElementById('startBtn');
  const quizDiv = document.getElementById('quiz');
  const qIndexEl = document.getElementById('qIndex');
  const qTotalEl = document.getElementById('qTotal');
  const scoreEl = document.getElementById('score');
  const questionText = document.getElementById('questionText');
  const answersEl = document.getElementById('answers');
  const nextBtn = document.getElementById('nextBtn');
  const quitBtn = document.getElementById('quitBtn');
  const resultDiv = document.getElementById('result');
  const finalScore = document.getElementById('finalScore');
  const maxScore = document.getElementById('maxScore');
  const retryBtn = document.getElementById('retryBtn');

  let current = 0;
  let score = 0;
  let answered = false;

  startBtn.addEventListener('click', () => {
    intro.classList.add('hidden');
    quizDiv.classList.remove('hidden');
    qTotalEl.innerText = questions.length;
    startQuiz();
  });

  function startQuiz(){
    current = 0; score = 0;
    showQuestion();
    updateScore();
  }

  function showQuestion(){
    const item = questions[current];
    qIndexEl.innerText = current + 1;
    questionText.innerText = item.q;
    answersEl.innerHTML = '';
    answered = false;
    nextBtn.disabled = true;

    item.choices.forEach((ch, i) => {
      const btn = document.createElement('button');
      btn.className = 'w-full text-left bg-white/5 p-3 rounded-md hover:bg-white/10 transition';
      btn.innerText = ch;
      btn.onclick = () => selectAnswer(i, btn);
      answersEl.appendChild(btn);
    });
  }

  function selectAnswer(i, btn){
    if(answered) return;
    answered = true;
    const correct = questions[current].a;

    Array.from(answersEl.children).forEach((b, idx) => {
      b.disabled = true;
      if(idx === correct) b.classList.add('ring-2','ring-green-400');
      else b.classList.add('opacity-70');
    });
    if(i === correct){
      score += 1;
    }
    updateScore();
    nextBtn.disabled = false;
  }

  nextBtn.addEventListener('click', () => {
    current++;
    if(current >= questions.length){
      finishQuiz();
    } else showQuestion();
  });

  quitBtn.addEventListener('click', () => {
    finishQuiz();
  });

  function updateScore(){
    scoreEl.innerText = score;
  }

  function finishQuiz(){
    quizDiv.classList.add('hidden');
    resultDiv.classList.remove('hidden');
    finalScore.innerText = score;
    maxScore.innerText = questions.length;

    saveLeaderboard(score);
  }

  retryBtn.addEventListener('click', () => {
    resultDiv.classList.add('hidden');
    intro.classList.remove('hidden');
  });


  function saveLeaderboard(score){
    const key = 'f1_quiz_leaderboard';
    const list = JSON.parse(localStorage.getItem(key) || '[]');
    list.push({score, date: new Date().toISOString()});
    list.sort((a,b)=>b.score-a.score);
    localStorage.setItem(key, JSON.stringify(list.slice(0,10)));
  }
</script>
</body>
</html>
